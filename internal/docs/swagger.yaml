definitions:
  auth.LoginResponse:
    properties:
      access_token:
        type: string
      expire_at:
        type: integer
    type: object
  dto.FlatDTO:
    properties:
      flat_catigory:
        type: string
      flat_number:
        type: integer
      floor:
        type: integer
    type: object
  dto.GeographyDTO:
    properties:
      lat:
        type: number
      lon:
        type: number
    type: object
  dto.HouseDTO:
    type: object
  dto.PhotoDTO:
    properties:
      img_url:
        type: string
      order:
        type: integer
    type: object
  dto.PosterCardDTO:
    properties:
      address:
        type: string
      area:
        type: number
      beds:
        type: integer
      id:
        type: integer
      imageUrl:
        type: string
      metro:
        type: string
      price:
        type: number
      rating:
        type: number
    type: object
  dto.PosterDTO:
    properties:
      address:
        type: string
      alias:
        type: string
      area:
        type: number
      building_geo:
        $ref: '#/definitions/dto.GeographyDTO'
      category:
        type: string
      city:
        type: string
      company:
        type: string
      company_logo:
        type: string
      description:
        type: string
      district:
        type: string
      flat:
        $ref: '#/definitions/dto.FlatDTO'
      floor_count:
        type: integer
      house:
        $ref: '#/definitions/dto.HouseDTO'
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/dto.PhotoDTO'
        type: array
      metro:
        type: string
      metro_geo:
        $ref: '#/definitions/dto.GeographyDTO'
      price:
        type: number
      seller:
        $ref: '#/definitions/dto.PosterSellerDTO'
    type: object
  dto.PosterSellerDTO:
    properties:
      seller_first_name:
        type: string
      seller_last_name:
        type: string
      seller_phone:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      details:
        type: string
      error:
        type: string
    type: object
  response.PosterResponse:
    properties:
      poster:
        $ref: '#/definitions/dto.PosterDTO'
    type: object
  response.PostersResponse:
    properties:
      len:
        type: integer
      posters:
        items:
          $ref: '#/definitions/dto.PosterCardDTO'
        type: array
    type: object
  response.ValidationErrorResponse:
    properties:
      error:
        type: string
      field:
        type: string
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticate user and return access token + set refresh token cookie
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      responses:
        "200":
          description: Successful login, returns access token
          headers:
            Set-Cookie:
              description: refresh_token=<NEW_REFRESH_TOKEN>; HttpOnly; Path=/api/auth/refresh;
                Max-Age=...
              type: string
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ValidationErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Blacklist access/refresh tokens and delete refresh cookie
      produces:
      - application/json
      responses:
        "204":
          description: Successfully logged out (no content)
        "400":
          description: Missing tokens
          schema:
            $ref: '#/definitions/response.ValidationErrorResponse'
        "401":
          description: Invalid tokens
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Blacklist error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Obtain new access token using refresh token stored in cookie (refresh_token
        cookie required)
      produces:
      - application/json
      responses:
        "200":
          description: New access token, also updates refresh token cookie
          headers:
            Set-Cookie:
              description: new refresh_token=...; HttpOnly; Path=/api/auth/refresh;
                Max-Age=...
              type: string
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/reg:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Register new user with email and password
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ValidationErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Register new user
      tags:
      - Auth
  /posters:
    get:
      description: Returns the number of retrieved posters and their list
      parameters:
      - default: 12
        description: Number of posters
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Pagination offset
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PostersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get list of posters
      tags:
      - posters
  /posters/by-alias/{alias}:
    get:
      description: Returns the poster with all information about it
      parameters:
      - description: Alias of poster
        in: path
        name: alias
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PosterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get poster by alias
      tags:
      - posters
swagger: "2.0"
