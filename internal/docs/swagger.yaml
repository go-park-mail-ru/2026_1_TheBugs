basePath: /api
definitions:
  auth.LoginResponse:
    properties:
      access_token:
        type: string
      expire_at:
        type: integer
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Created by TheBugs in 2026
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: DomDeli API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticate user and return access token + set refresh token cookie
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      responses:
        "200":
          description: Successful login, returns access token
          headers:
            Set-Cookie:
              description: refresh_token=<NEW_REFRESH_TOKEN>; HttpOnly; Path=/api/auth/refresh;
                Max-Age=...
              type: string
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal error
          schema:
            type: string
      summary: Login user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Obtain new access token using refresh token stored in cookie (refresh_token
        cookie required)
      produces:
      - application/json
      responses:
        "200":
          description: New access token, also updates refresh token cookie
          headers:
            Set-Cookie:
              description: new refresh_token=...; HttpOnly; Path=/api/auth/refresh;
                Max-Age=...
              type: string
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized - invalid or missing refresh token
          schema:
            type: string
        "500":
          description: Internal error
          schema:
            type: string
      summary: Refresh access token
      tags:
      - Auth
  /auth/reg:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Register new user with email and password
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal error
          schema:
            type: string
      summary: Register new user
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
