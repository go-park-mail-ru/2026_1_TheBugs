basePath: /api
definitions:
  auth.LoginResponse:
    properties:
      access_token:
        type: string
      expire_at:
        type: integer
    type: object
  dto.PosterDTO:
    properties:
      address:
        type: string
      area:
        type: number
      beds:
        type: integer
      id:
        type: integer
      imageUrl:
        type: string
      metro:
        type: string
      price:
        type: number
      rating:
        type: number
    type: object
  response.ErrorResponse:
    properties:
      details:
        type: string
      error:
        type: string
    type: object
  response.PostersResponse:
    properties:
      len:
        type: integer
      posters:
        items:
          $ref: '#/definitions/dto.PosterDTO'
        type: array
    type: object
  response.ValidationErrorResponse:
    properties:
      error:
        type: string
      field:
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Created by TheBugs in 2026
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: DomDeli API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticate user and return access token + set refresh token cookie
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      responses:
        "200":
          description: Successful login, returns access token
          headers:
            Set-Cookie:
              description: refresh_token=<NEW_REFRESH_TOKEN>; HttpOnly; Path=/api/auth/refresh;
                Max-Age=...
              type: string
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ValidationErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Obtain new access token using refresh token stored in cookie (refresh_token
        cookie required)
      produces:
      - application/json
      responses:
        "200":
          description: New access token, also updates refresh token cookie
          headers:
            Set-Cookie:
              description: new refresh_token=...; HttpOnly; Path=/api/auth/refresh;
                Max-Age=...
              type: string
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/reg:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Register new user with email and password
      parameters:
      - description: User email
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ValidationErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Register new user
      tags:
      - Auth
  /posters:
    get:
      description: Возвращает количество полученных объявлений и их список
      parameters:
      - default: 12
        description: Количество объявлений
        in: query
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Сдвиг для пагинации
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PostersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Получить список объявлений
      tags:
      - posters
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
