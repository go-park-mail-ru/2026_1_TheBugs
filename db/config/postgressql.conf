# ==============================
# == Connections & Security ==
# ==============================

# Слушать только локальный интерфейс (localhost).
# Если приложение в другом контейнере/сервисе, нужно слушать все ('*').
listen_addresses = 'localhost'

# Максимальное число одновременных подключений к серверу БД.
# Должно быть больше, чем MaxConns в приложении + запас для админки.
max_connections = 100

# Лимит блокировок на одну транзакцию. Нужно увеличивать при росте max_connections.
max_locks_per_transaction = 128

# Требовать зашифрованные пароли (SCRAM-SHA-256).
password_encryption = scram-sha-256

# =================================
# == Memory & Performance Tuning ==
# =================================

# Общий буфер сервера. Рекомендуется 25% от ОЗУ сервера.
shared_buffers = 1GB

# Память для сортировок и хеш-таблиц. Рекомендуется 25% от ОЗУ.
work_mem = 50MB

# Память для фоновых операций (VACUUM, CREATE INDEX). Рекомендуется 1GB.
maintenance_work_mem = 1GB

# =========================
# == Write-Ahead Log (WAL) ==
# =========================

# Включить архивирование WAL (необходимо для бэкапов PITR).
archive_mode = on
archive_command = 'test ! -f /wal_archive/%f && cp %p /wal_archive/%f'

# Минимальный процент WAL для записи (0 - запись по времени).
# Оставляем по умолчанию для надежности.
wal_min_size = 16MB

# ==========================
# == Statement Timeouts ==
# ==========================

# Таймаут выполнения одного запроса (в миллисекундах).
# 0 - выключено. Защищает от зависших тяжелых запросов и DOS-атак.
statement_timeout = 30000 # 30 секунд. Аргументация: Защищает UI от "вечного" ожидания.

# Таймаут ожидания блокировки (в миллисекундах).
# Предотвращает взаимные блокировки (deadlocks).
lock_timeout = 5000 # 5 секунд. Аргументация: Позволяет быстро обработать конфликт блокировок.

# ======================
# == Logging & Auditing ==
# ======================

# Включить сборщик логов (обязательно для PGBadger).
logging_collector = on

# Путь к папке с логами.
log_directory = 'log'

# Имя файла лога с датой.
log_filename = 'postgresql-%Y-%m-%d.log'

# Формат строки в логе. Стандарт для парсинга PGBadger.
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Логировать запросы, которые выполняются дольше указанного времени (мс).
log_min_duration_statement = 1000 # 1 секунда. Аргументация: Логируем всё, что медленнее UI-таймаута.

shared_preload_libraries = 'pg_stat_statements, auto_explain'

pg_stat_statements.track = all
auto_explain.log_min_duration = 1000 
auto_explain.log_analyze = true