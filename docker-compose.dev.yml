services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: postgres
    environment:
      POSTGRES_USER: thebugs
      POSTGRES_PASSWORD: thebugs
      POSTGRES_DB: main
      POSTGRES_CONF: /etc/postgresql/16/main/postgresql.conf 
    ports:
      - "5435:5432"
    command: >
      postgres 
      -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d
      - ./db/config/postgresql.conf:/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thebugs -d main"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres_exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_URI: "postgres:5432/main?sslmode=disable"
      DATA_SOURCE_USER: "postgres_exporter"
      DATA_SOURCE_PASS: "postgres_exporter"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio: 
    image:
      quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment: 
      MINIO_ACCESS_KEY: admin123
      MINIO_SECRET_KEY: admin123
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ALIAS: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin123
      MINIO_SECRET_KEY: admin123
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 admin123 admin123 &&
      mc mb minio/media --ignore-existing &&
      mc anonymous set public minio/media &&
      echo 'Bucket media created and public for download'
      "
    restart: "no"

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    environment:
    - TZ=Europe/Moscow
    - MAILDEV_WEB_PORT=1080
    - MAILDEV_SMTP_PORT=1025
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
      - http.cors.allow-headers="*"
    ports:
      - "9200:9200"
    volumes:
      - ./deploy/elasticsearch/init.sh:/usr/local/bin/init-es.sh
    # command: >
    #   bash -c "
    #     /usr/local/bin/docker-entrypoint.sh elasticsearch &
    #     sleep 30 && 
    #     sh /usr/local/bin/init-es.sh &&
    #     wait
    #   "
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  logstash:
    build: 
      context: ./deploy/logstash
      dockerfile: Dockerfile
    volumes:
      - ./deploy/logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - postgres
      - elasticsearch

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  elasticvue:
    image: cars10/elasticvue:latest
    container_name: elasticvue
    ports:
      - "8085:8080"
    restart: unless-stopped

  
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100" 
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/config.yml
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 10


  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
  
  kafka:
    image: confluentinc/cp-kafka:7.4.4
    depends_on:
      - zookeeper
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 45000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 30000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "cub", "kafka-ready", "-b", "localhost:9092", "1", "30"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
  kafka-init:
    image: confluentinc/cp-kafka:7.4.4
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command: |
      "
      cub kafka-ready -b kafka:9092 1 30
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email-notification --partitions 3 --replication-factor 1
      echo 'Topics created'
      "

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'local'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:9092'
    depends_on:
      - kafka

